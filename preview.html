<!DOCTYPE html>
<html>
    <head>
        <title>Voice Orb | Preview</title>
        <script src="./voice-orb.js"></script>
    </head>
    <body>
        <voice-orb id="orb" size="300"></voice-orb>
        <script>
            customElements
                .whenDefined("voice-orb")
                .then(()=>{
                    const orb = document.getElementById("orb");

                    orb.update({
                        colors: [
                            [245, 203, 76],
                            [224, 134, 211],
                            [231, 177, 13]
                        ],
                        transitionTime: 2000,
                        morphSpeed: 0.5,
                        randomness: 0.75,
                        rotationSpeed: 0.8
                    });

                    setTimeout(() => {
                        orb.update({
                            colors: [
                                
                                [14, 59, 67],
                                [89, 238, 208],
                                [14, 59, 67]
                            ],
                            transitionTime: 1000,
                            morphSpeed: 0.125,
                            randomness: 0,
                            rotationSpeed: 0.1
                        });
                    }, 8000);
                });
        </script>
    </body>
</html>
